<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background tile (Python blue, chunky drop-shadow square to match the
       rest of the Cyberdyne pixel-icon family) -->
  <rect x="6" y="9" width="55" height="51" fill="#1e3a5f"/>
  <rect x="3" y="5" width="55" height="51" fill="#306998" stroke="#000" stroke-width="2"/>

  <!-- Two interlocking Python "snakes": blue upper, gold lower -->
  <g stroke="#000" stroke-width="1.5">
    <!-- Upper (blue) -->
    <path d="M30 12 h6 a5 5 0 0 1 5 5 v8 a5 5 0 0 1 -5 5 H24 a5 5 0 0 0 -5 5 v5 H14 v-6 a6 6 0 0 1 6 -6 h12 a3 3 0 0 0 3 -3 v-3 H22 v-6 a6 6 0 0 1 6 -6 Z" fill="#4b8bbe"/>
    <circle cx="26" cy="18" r="2" fill="#fff"/>
  </g>
  <g stroke="#000" stroke-width="1.5">
    <!-- Lower (gold), point-symmetric to the upper snake -->
    <path d="M34 52 h-6 a5 5 0 0 1 -5 -5 v-8 a5 5 0 0 1 5 -5 H40 a5 5 0 0 0 5 -5 v-5 H50 v6 a6 6 0 0 1 -6 6 H32 a3 3 0 0 0 -3 3 v3 H42 v6 a6 6 0 0 1 -6 6 Z" fill="#ffd43b"/>
    <circle cx="38" cy="46" r="2" fill="#306998"/>
  </g>
</svg>
