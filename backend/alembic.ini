[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
# Migration filenames sort by mtime + a numeric prefix we set manually so
# the order doesn't depend on filesystem clock.
file_template = %%(rev)s_%%(slug)s

# The actual DATABASE_URL is injected from settings at runtime —
# see alembic/env.py. The placeholder here is what `alembic` falls back
# to if env.py fails to import settings (it shouldn't).
sqlalchemy.url = driver://user:pass@host/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
