name: frontend-e2e

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

# Read access to the org's GitHub Packages registry, where the
# @cyberdynecorp/svelte-ui-* dependencies are published.
permissions:
  contents: read
  packages: read

jobs:
  responsive:
    name: Responsive E2E (iOS phones & iPads)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # frontend/.npmrc maps the @cyberdynecorp scope to GitHub Packages but
      # carries no token (it's injected from the environment). Append the auth
      # line so `npm ci` can pull the private UI packages in CI.
      - name: Authenticate npm to GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (WebKit + Chromium)
        run: npx playwright install --with-deps webkit chromium

      # The Playwright config's webServer runs `npm run build && npm run preview`,
      # so the suite exercises the production static build on every device project.
      - name: Run responsive E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
